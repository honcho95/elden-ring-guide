<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring - Interactive Checklist Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--sidebar:#111120;--card:#1a1a2e;--border:#2a2a40;--gold:#c8a951;--gold-dim:#8a6d2b;--gold-bright:#e8c960;--text:#e0d8c8;--text-dim:#8a8478;--text-muted:#5a5650}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:380px;min-width:380px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;overflow:hidden}
.sidebar-header{padding:20px 20px 12px;text-align:center;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-header h1{font-family:Georgia,'Times New Roman',serif;font-size:22px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
.sidebar-header h2{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;font-weight:400}
.search-wrap{padding:12px 16px;flex-shrink:0}
.search-wrap input{width:100%;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--gold-dim)}.search-wrap input::placeholder{color:var(--text-muted)}
.overall-progress{padding:4px 16px 12px;flex-shrink:0}
.progress-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px;transition:width .4s ease;width:0}
.progress-text{font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between}
.categories{flex:1;overflow-y:auto;padding:0 12px 12px}
.categories::-webkit-scrollbar{width:6px}.categories::-webkit-scrollbar-track{background:transparent}.categories::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cat-section{margin-bottom:6px}
.cat-header{display:flex;align-items:center;padding:8px;cursor:pointer;border-radius:6px;transition:background .2s;user-select:none}
.cat-header:hover{background:var(--card)}
.cat-toggle{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);margin-right:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.cat-toggle.visible{border-color:var(--gold);background:var(--gold)}
.cat-toggle.visible::after{content:'';display:block;width:8px;height:4px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.cat-dot{width:10px;height:10px;border-radius:50%;margin-right:8px;flex-shrink:0}
.cat-name{flex:1;font-size:13px;font-weight:500}
.cat-count{font-size:11px;color:var(--text-dim);margin-left:8px}
.cat-progress{font-size:10px;color:var(--gold-dim);margin-left:4px}
.cat-expand{width:20px;text-align:center;color:var(--text-muted);font-size:14px;transition:transform .2s}
.cat-expand.open{transform:rotate(90deg)}
.cat-items{display:none;padding:2px 0 2px 36px;max-height:300px;overflow-y:auto}.cat-items.open{display:block}
.cat-items::-webkit-scrollbar{width:4px}.cat-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cat-item{display:flex;align-items:center;padding:5px 8px;border-radius:4px;cursor:pointer;transition:background .15s;font-size:12.5px}
.cat-item:hover{background:rgba(200,169,81,.08)}
.cat-item .check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border);margin-right:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cat-item.checked .check{border-color:var(--gold);background:var(--gold)}
.cat-item.checked .check::after{content:'';display:block;width:7px;height:3.5px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translateY(-1px)}
.cat-item.checked .item-name{text-decoration:line-through;color:var(--text-muted)}
.item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.sidebar-footer button{flex:1;padding:6px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:11px;cursor:pointer;transition:all .2s}
.sidebar-footer button:hover{border-color:var(--gold-dim);color:var(--text)}
#map{flex:1;background:#08080f}
.leaflet-container{background:#08080f!important}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--border)!important}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border:1px solid var(--border);border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-content{margin:12px 16px!important;font-size:13px;line-height:1.5}
.popup-title{font-weight:600;font-size:14px;margin-bottom:2px;color:var(--gold)}
.popup-cat{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.popup-desc{font-size:12px;color:var(--text-dim);margin-bottom:8px;max-width:250px}
.popup-btn{display:inline-block;padding:5px 14px;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.popup-btn.mark{background:var(--gold);color:#000}.popup-btn.mark:hover{background:var(--gold-bright)}
.popup-btn.unmark{background:var(--border);color:var(--text-dim)}.popup-btn.unmark:hover{background:#3a3a50}
#toggle-sidebar{position:fixed;top:10px;left:10px;z-index:1001;background:var(--card);border:1px solid var(--border);color:var(--gold);width:36px;height:36px;border-radius:6px;cursor:pointer;font-size:18px;display:none;align-items:center;justify-content:center}
@media(max-width:768px){#sidebar{position:fixed;left:-380px;transition:left .3s;z-index:1001;height:100%}#sidebar.open{left:0}#toggle-sidebar{display:flex}}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.loading-overlay h1{font-family:Georgia,serif;font-size:28px;letter-spacing:8px;color:var(--gold);text-transform:uppercase}
.loading-overlay p{color:var(--text-dim);font-size:13px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div><h1>Elden Ring</h1><p>Loading 3,131 markers...</p></div>
<button id="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
<div id="app">
<div id="sidebar">
  <div class="sidebar-header"><h1>Elden Ring</h1><h2>Interactive Checklist Map</h2></div>
  <div class="search-wrap"><input type="text" id="search" placeholder="Search locations, bosses, items..."></div>
  <div class="overall-progress"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="progress-text"><span id="progressText">0 / 0</span><span id="progressPct">0%</span></div></div>
  <div class="categories" id="catBox"></div>
  <div class="sidebar-footer">
    <button onclick="resetProgress()">Reset Progress</button>
    <button onclick="exportProgress()">Export</button>
    <button onclick="importProgress()">Import</button>
  </div>
</div>
<div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════ CONFIG ═══════════
const CATEGORIES = {
  'Site of Grace':      {color:'#f5c542',icon:'grace',    priority:1},
  'Bosses':             {color:'#ff4444',icon:'boss',     priority:2},
  'NPC':                {color:'#44bbff',icon:'dot',      priority:3},
  'NPC Invader':        {color:'#ff6644',icon:'dot',      priority:4},
  'Weapons':            {color:'#ff8844',icon:'dot',      priority:5},
  'Shields':            {color:'#dd7733',icon:'dot',      priority:6},
  'Armor':              {color:'#aa88cc',icon:'dot',      priority:7},
  'Talismans':          {color:'#44ddaa',icon:'dot',      priority:8},
  'Spells':             {color:'#8888ff',icon:'dot',      priority:9},
  'Spirit Ashes':       {color:'#66ccff',icon:'dot',      priority:10},
  'Ashes of War':       {color:'#bbbb44',icon:'dot',      priority:11},
  'Flask Upgrades':     {color:'#ff66aa',icon:'dot',      priority:12},
  'Key':                {color:'#dddddd',icon:'dot',      priority:13},
  'Consumables':        {color:'#88aa66',icon:'dot',      priority:14},
  'Materials':          {color:'#77aa77',icon:'dot',      priority:15},
  'Upgrade Materials':  {color:'#ccaa55',icon:'dot',      priority:16},
  'Locations':          {color:'#aaaaaa',icon:'dot',      priority:17},
  'Summoning Pool':     {color:'#9988cc',icon:'dot',      priority:18},
  'Waygates':           {color:'#44dddd',icon:'dot',      priority:19},
  'Spiritsprings':      {color:'#66ee88',icon:'dot',      priority:20},
  'Maps':               {color:'#ddcc88',icon:'dot',      priority:21},
  'Remembrance':        {color:'#ffcc00',icon:'dot',      priority:22},
};

// ═══════════ FEXTRALIFE TILE CONFIG ═══════════
// Using the exact same tiles + CRS as the Fextralife wiki interactive map
const TILE_URL = 'https://eldenring.wiki.fextralife.com/file/Elden-Ring/map-50be4728-3907-4f33-8857-7f063e0d24eb/map-tiles.4/{z}/{x}/{y}.jpg';

// ═══════════ STATE ═══════════
let map, markersData = [], markerLayers = {}, catLayers = {};
let checked = JSON.parse(localStorage.getItem('er-checked') || '{}');
let catVisible = JSON.parse(localStorage.getItem('er-catvis') || '{}');
let catOpen = {};

// ═══════════ INIT ═══════════
fetch('markers.json')
  .then(r => r.json())
  .then(data => { markersData = data; init(); })
  .catch(e => { document.getElementById('loading').innerHTML = '<h1>Error</h1><p>'+e.message+'</p>'; });

function init() {
  // Exact same Leaflet config as Fextralife wiki — CRS.Simple, same tiles
  map = L.map('map', {
    crs: L.CRS.Simple,
    zoomSnap: 0.25,
    attributionControl: false,
    center: [0, 0],
    zoom: 2,
  });
  map.options.minZoom = 2;
  map.options.maxZoom = 7;

  L.tileLayer(TILE_URL, {minZoom:0, maxZoom:7, continuousWorld:false, noWrap:true, crs: L.CRS.Simple}).addTo(map);
  var mapSW = [0, 35000], mapNE = [35000, 0];
  map.setMaxBounds(new L.LatLngBounds(map.unproject(mapSW, map.getMaxZoom()), map.unproject(mapNE, map.getMaxZoom())));

  // Create category layer groups
  Object.keys(CATEGORIES).forEach(cat => {
    catLayers[cat] = L.layerGroup();
    if (catVisible[cat] !== false) catLayers[cat].addTo(map);
  });

  // Create markers
  markersData.forEach((item, idx) => {
    // Fextralife x = lat, y = lng — use directly in CRS.Simple
    const lat = item.x;
    const lng = item.y;

    const cat = CATEGORIES[item.c] || {color:'#888',icon:'dot'};
    const isChecked = !!checked[idx];
    const size = item.c === 'Bosses' ? 10 : item.c === 'Site of Grace' ? 8 : 6;

    const marker = L.circleMarker([lat, lng], {
      radius: size,
      fillColor: cat.color,
      color: isChecked ? '#333' : cat.color,
      weight: isChecked ? 1 : 2,
      opacity: isChecked ? 0.3 : 0.9,
      fillOpacity: isChecked ? 0.15 : 0.7,
    });

    marker.bindPopup(() => createPopup(idx, item), {maxWidth:280});
    marker.on('click', () => map.setView([lat, lng]));
    marker._erIdx = idx;
    marker._erCat = item.c;

    if (catLayers[item.c]) marker.addTo(catLayers[item.c]);
    markerLayers[idx] = marker;
  });

  buildSidebar();
  updateProgress();
  document.getElementById('loading').style.display = 'none';

  // Search
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    filterSidebar(q);
  });
}

// ═══════════ POPUP ═══════════
function createPopup(idx, item) {
  const isChecked = !!checked[idx];
  const cat = CATEGORIES[item.c] || {color:'#888'};
  return `<div>
    <div class="popup-title">${item.n}</div>
    <div class="popup-cat" style="color:${cat.color}">${item.c}</div>
    ${item.d ? '<div class="popup-desc">'+item.d+'</div>' : ''}
    <button class="popup-btn ${isChecked ? 'unmark' : 'mark'}" onclick="toggleCheck(${idx})">${isChecked ? 'Unmark' : 'Mark Complete'}</button>
  </div>`;
}

// ═══════════ CHECK/UNCHECK ═══════════
function toggleCheck(idx) {
  checked[idx] = !checked[idx];
  saveChecked();
  updateMarkerStyle(idx);
  updateSidebarItem(idx);
  updateProgress();
  // Refresh popup
  const m = markerLayers[idx];
  if (m && m.isPopupOpen()) {
    m.closePopup();
    m.openPopup();
  }
}

function updateMarkerStyle(idx) {
  const m = markerLayers[idx];
  if (!m) return;
  const isChecked = !!checked[idx];
  const cat = CATEGORIES[markersData[idx].c] || {color:'#888'};
  m.setStyle({
    color: isChecked ? '#333' : cat.color,
    weight: isChecked ? 1 : 2,
    opacity: isChecked ? 0.3 : 0.9,
    fillOpacity: isChecked ? 0.15 : 0.7,
  });
}

function saveChecked() { localStorage.setItem('er-checked', JSON.stringify(checked)); }
function saveCatVis() { localStorage.setItem('er-catvis', JSON.stringify(catVisible)); }

// ═══════════ SIDEBAR ═══════════
function buildSidebar() {
  const box = document.getElementById('catBox');
  box.innerHTML = '';

  // Group items by category
  const groups = {};
  markersData.forEach((item, idx) => {
    if (!groups[item.c]) groups[item.c] = [];
    groups[item.c].push({...item, idx});
  });

  // Sort categories by priority
  const sortedCats = Object.keys(groups).sort((a, b) =>
    (CATEGORIES[a]?.priority || 99) - (CATEGORIES[b]?.priority || 99)
  );

  sortedCats.forEach(cat => {
    const items = groups[cat].sort((a, b) => a.n.localeCompare(b.n));
    const catConf = CATEGORIES[cat] || {color:'#888'};
    const isVis = catVisible[cat] !== false;
    const checkedCount = items.filter(i => checked[i.idx]).length;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.dataset.cat = cat;

    section.innerHTML = `
      <div class="cat-header" onclick="toggleCatOpen('${cat}')">
        <div class="cat-toggle ${isVis ? 'visible' : ''}" onclick="event.stopPropagation();toggleCatVis('${cat}')"></div>
        <div class="cat-dot" style="background:${catConf.color}"></div>
        <span class="cat-name">${cat}</span>
        <span class="cat-progress">${checkedCount}/${items.length}</span>
        <span class="cat-expand ${catOpen[cat] ? 'open' : ''}">&#9654;</span>
      </div>
      <div class="cat-items ${catOpen[cat] ? 'open' : ''}" data-cat-items="${cat}">
        ${items.map(item => `
          <div class="cat-item ${checked[item.idx] ? 'checked' : ''}" data-idx="${item.idx}" onclick="flyToItem(${item.idx})">
            <div class="check" onclick="event.stopPropagation();toggleCheck(${item.idx})"></div>
            <span class="item-name">${item.n}</span>
          </div>
        `).join('')}
      </div>
    `;
    box.appendChild(section);
  });
}

function toggleCatOpen(cat) {
  catOpen[cat] = !catOpen[cat];
  const section = document.querySelector(`.cat-section[data-cat="${cat}"]`);
  if (!section) return;
  section.querySelector('.cat-expand').classList.toggle('open', catOpen[cat]);
  section.querySelector('.cat-items').classList.toggle('open', catOpen[cat]);
}

function toggleCatVis(cat) {
  const isVis = catVisible[cat] !== false;
  catVisible[cat] = !isVis;
  saveCatVis();

  if (catVisible[cat] === false) {
    map.removeLayer(catLayers[cat]);
  } else {
    catLayers[cat].addTo(map);
  }

  const section = document.querySelector(`.cat-section[data-cat="${cat}"]`);
  if (section) section.querySelector('.cat-toggle').classList.toggle('visible', !isVis);
}

function flyToItem(idx) {
  const m = markerLayers[idx];
  if (!m) return;
  const cat = markersData[idx].c;
  // Ensure category is visible
  if (catVisible[cat] === false) toggleCatVis(cat);
  map.setView(m.getLatLng(), 5, {animate: true});
  setTimeout(() => m.openPopup(), 300);
}

function updateSidebarItem(idx) {
  const el = document.querySelector(`.cat-item[data-idx="${idx}"]`);
  if (el) el.classList.toggle('checked', !!checked[idx]);

  // Update category progress
  const cat = markersData[idx].c;
  const section = document.querySelector(`.cat-section[data-cat="${cat}"]`);
  if (section) {
    const items = markersData.filter((m, i) => m.c === cat);
    const checkedCount = markersData.filter((m, i) => m.c === cat && checked[i]).length;
    section.querySelector('.cat-progress').textContent = `${checkedCount}/${items.length}`;
  }
}

function updateProgress() {
  const total = markersData.length;
  const done = Object.keys(checked).filter(k => checked[k]).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function filterSidebar(q) {
  document.querySelectorAll('.cat-section').forEach(section => {
    const cat = section.dataset.cat;
    let anyVisible = false;
    section.querySelectorAll('.cat-item').forEach(el => {
      const idx = +el.dataset.idx;
      const name = markersData[idx].n.toLowerCase();
      const show = !q || name.includes(q) || cat.toLowerCase().includes(q);
      el.style.display = show ? '' : 'none';
      if (show) anyVisible = true;
    });
    section.style.display = anyVisible ? '' : 'none';
    if (q && anyVisible) {
      section.querySelector('.cat-items').classList.add('open');
      section.querySelector('.cat-expand').classList.add('open');
    }
  });
}

// ═══════════ FOOTER ACTIONS ═══════════
function resetProgress() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  checked = {};
  saveChecked();
  Object.keys(markerLayers).forEach(idx => updateMarkerStyle(+idx));
  buildSidebar();
  updateProgress();
}

function exportProgress() {
  const data = JSON.stringify({checked, catVisible, version: 1});
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'elden-ring-progress.json'; a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.checked) {
          checked = data.checked;
          saveChecked();
          if (data.catVisible) { catVisible = data.catVisible; saveCatVis(); }
          Object.keys(markerLayers).forEach(idx => updateMarkerStyle(+idx));
          buildSidebar();
          updateProgress();
          // Re-apply category visibility
          Object.keys(catLayers).forEach(cat => {
            if (catVisible[cat] === false) map.removeLayer(catLayers[cat]);
            else if (!map.hasLayer(catLayers[cat])) catLayers[cat].addTo(map);
          });
        }
      } catch(err) { alert('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
</script>
</body>
</html>
