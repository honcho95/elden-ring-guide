.fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}

.search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 10px;border-radius:16px;font-size:11px;outline:none;width:180px;font-family:'Inter',sans-serif;margin-left:auto}
.search-input::placeholder{color:var(--text-dim)}.search-input:focus{border-color:var(--gold-dim)}

.region.done .rbg{stroke:var(--green);stroke-width:2}

.region .rpct{font-family:'Inter',sans-serif;font-size:8px;fill:var(--gold);text-anchor:middle;pointer-events:none}

.pin-wrap.no-img .fb{color:var(--text-dim);text-align:center;font-size:13px}

.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:5;-webkit-tap-highlight-color:transparent}

.pin-location .pin-dot{background:#9c6dd6}
.pin-quest .pin-dot{background:#5c8dd6}

.pin-legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}

.area-panel{width:400px;min-width:400px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}

.area-panel-stats{display:flex;gap:10px;margin-top:8px;font-size:11px}
.dstat{background:var(--bg4);padding:3px 8px;border-radius:10px;color:var(--text-dim)}.dstat span{color:var(--text);font-weight:500}

// ===================== STATE =====================
let ck=JSON.parse(localStorage.getItem('er5_ck')||'{}');
let qk=JSON.parse(localStorage.getItem('er5_qk')||'{}');
let curArea=null,curView='map',curMap='overworld',curFilter='all',hlPin=null;
function save(){localStorage.setItem('er5_ck',JSON.stringify(ck));localStorage.setItem('er5_qk',JSON.stringify(qk))}

// ===================== WORLD MAP =====================
function showMap(id,el){curMap=id;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');renderMap()}
function renderMap(){
const ml=mapLayout[curMap],areas=A.filter(a=>a.map===curMap),rw=140,rh=44;
let s=`<svg viewBox="${ml.viewBox}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif"><defs><radialGradient id="erdtreeGrad"><stop offset="0%" stop-color="#c8a84e" stop-opacity=".3"/><stop offset="100%" stop-color="#c8a84e" stop-opacity="0"/></radialGradient></defs>`;
if(ml.land)s+=`<path class="land" d="${ml.land}" opacity=".6"/>`;
if(ml.erdtree){const e=ml.erdtree;s+=`<circle class="erdtree-glow" cx="${e.x}" cy="${e.y-10}" r="60"/><line class="erdtree-trunk" x1="${e.x}" y1="${e.y+15}" x2="${e.x}" y2="${e.y-40}"/><line class="erdtree-trunk" x1="${e.x}" y1="${e.y-20}" x2="${e.x-15}" y2="${e.y-35}"/><line class="erdtree-trunk" x1="${e.x}" y1="${e.y-20}" x2="${e.x+15}" y2="${e.y-35}"/>`}
ml.connections.forEach(([f,t])=>{const a1=A.find(a=>a.id===f),a2=A.find(a=>a.id===t);if(a1&&a2)s+=`<line class="conn" x1="${a1.sx}" y1="${a1.sy}" x2="${a2.sx}" y2="${a2.sy}"/>`});
areas.forEach(a=>{const total=a.items.length,done=a.items.filter(i=>ck[i.id]).length,pct=total>0?Math.round(done/total*100):0,x=a.sx-rw/2,y=a.sy-rh/2,pbw=rw-20,hasMiss=a.items.some(i=>i.missable&&!ck[i.id]);
s+=`<g class="region${pct===100?' done':''}" onclick="selectArea('${a.id}')"><rect class="rbg" x="${x}" y="${y}" width="${rw}" height="${rh}" fill="${a.color||'#1a1a2e'}"/><text class="rlbl" x="${a.sx}" y="${a.sy-2}">${a.name}</text><rect class="rpbar-bg" x="${x+10}" y="${a.sy+10}" width="${pbw}" height="4"/><rect class="rpbar" x="${x+10}" y="${a.sy+10}" width="${pbw*pct/100}" height="4"/><text class="rpct" x="${a.sx}" y="${a.sy+24}">${pct}%</text>${hasMiss?`<circle class="miss-dot" cx="${x+rw-6}" cy="${y+6}" r="4"/>`:''}</g>`});
if(curMap==='overworld')s+=`<text class="floating-label" x="840" y="50">(flottant)</text>`;
s+=`</svg>`;document.getElementById('mapCont').innerHTML=s}

// ===================== AREA VIEW =====================
function selectArea(id){
curArea=id;const a=A.find(x=>x.id===id);if(!a)return;
document.getElementById('mapWrap').classList.add('hidden');
document.getElementById('areaView').classList.remove('hidden');
document.getElementById('apTitle').textContent=a.name;
document.getElementById('apDesc').textContent=a.desc;
updAreaStats(a);
renderAreaMap(a);
renderCklist(a);
}

function renderAreaMap(a){
const mc=document.getElementById('areaMapContent');
const pins=a.items.filter(i=>i.bx!==undefined);
let h='<div class="pin-wrap'+(a.img?'':' no-img')+'">';
if(a.img){
  h+=`<img src="${a.img}" alt="${a.name}" onerror="this.style.display='none'">`;
  pins.forEach(i=>{
    const done=ck[i.id];
    h+=`<div class="pin pin-${i.type}${done?' ck':''}" style="left:${i.bx}%;top:${i.by}%" onclick="togFromPin('${i.id}','${a.id}')" onmouseenter="hlItem('${i.id}')" onmouseleave="unhlItem('${i.id}')"><div class="pin-dot"></div><div class="pin-tip">${i.name}</div></div>`;
  });
} else {
  h+=`<div class="fb"><b>${a.name}</b><br>Pas de carte. Checklist a droite →</div>`;
}
h+='</div>';mc.innerHTML=h;
}

function togFromPin(iid,aid){
ck[iid]=!ck[iid];save();
const a=A.find(x=>x.id===aid);if(!a)return;
renderAreaMap(a);renderCklist(a);updAreaStats(a);updateProg();
}

function hlItem(iid){
const el=document.getElementById('ci_'+iid);
if(el){el.classList.add('hl');el.scrollIntoView({behavior:'smooth',block:'nearest'})}
}
function unhlItem(iid){
const el=document.getElementById('ci_'+iid);if(el)el.classList.remove('hl');
}

function updAreaStats(a){
const total=a.items.length,done=a.items.filter(i=>ck[i.id]).length,miss=a.items.filter(i=>i.missable).length,pct=total>0?Math.round(done/total*100):0;
document.getElementById('apStats').innerHTML=`<div class="dstat"><span>${done}/${total}</span> fait</div>${miss?`<div class="dstat" style="color:var(--red)"><span>${miss}</span> manquable</div>`:''}`;
document.getElementById('apBar').style.width=pct+'%';
}

function backToMap(){curArea=null;document.getElementById('areaView').classList.add('hidden');document.getElementById('mapWrap').classList.remove('hidden');renderMap()}

// ===================== CHECKLIST =====================
const typeNames={boss:'Boss',npc:'PNJ',item:'Objets',location:'Lieux',quest:'Quetes'};
function renderCklist(a){
const c=document.getElementById('cklist'),search=document.getElementById('searchIn').value.toLowerCase();
const groups={boss:[],npc:[],item:[],location:[],quest:[]};
a.items.forEach(i=>{
  if(curFilter==='missable'&&!i.missable)return;
  if(curFilter!=='all'&&curFilter!=='missable'&&i.type!==curFilter)return;
  if(search&&!i.name.toLowerCase().includes(search)&&!(i.desc||'').toLowerCase().includes(search))return;
  (groups[i.type]||groups.location).push(i);
});
let h='';
Object.entries(groups).forEach(([t,items])=>{
  if(!items.length)return;
  h+=`<div class="cg-title">${typeNames[t]||t}</div>`;
  items.forEach(i=>{const d=ck[i.id];
    h+=`<div class="ci${d?' done':''}" id="ci_${i.id}" onclick="tog('${i.id}','${a.id}')" onmouseenter="hlPin_('${i.id}')" onmouseleave="unhlPin_('${i.id}')"><div class="ci-box">${d?'&#10003;':''}</div><div class="ci-info"><div class="ci-name">${i.name}${i.missable?'<span class="tag tag-missable">Manquable</span>':''}<span class="tag tag-${i.type}">${typeNames[i.type]||i.type}</span></div><div class="ci-desc">${i.desc||''}${i.location?' <b>('+i.location+')</b>':''}</div></div></div>`;
  });
});
if(!h)h='<div style="padding:20px;color:var(--text-dim);text-align:center">Aucun element.</div>';
c.innerHTML=h;
}

function hlPin_(iid){document.querySelectorAll('.pin').forEach(p=>{if(p.onclick&&p.onclick.toString().includes(iid))p.classList.add('active')})}
function unhlPin_(iid){document.querySelectorAll('.pin.active').forEach(p=>p.classList.remove('active'))}

function tog(iid,aid){
ck[iid]=!ck[iid];save();
const a=A.find(x=>x.id===aid);if(!a)return;
renderCklist(a);renderAreaMap(a);updAreaStats(a);updateProg();
}

// ===================== QUESTS =====================
function renderQuests(){
const c=document.getElementById('qView');let h='<h2 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:14px;font-size:18px">Quetes PNJ</h2>';
quests.forEach(q=>{const total=q.steps.length,done=q.steps.filter((_,i)=>qk[q.id+'_'+i]).length;
h+=`<div class="qcard" id="q_${q.id}"><div class="qhead" onclick="togQ('${q.id}')"><div><div class="qname">${q.name}</div><div class="qmeta">${q.ending?`<span class="tag tag-fin">${q.ending}</span>`:''}${done}/${total}</div></div><span class="qarrow">&#9660;</span></div><div class="qsteps">`;
q.steps.forEach((s,i)=>{const k=q.id+'_'+i,d=qk[k],an=A.find(a=>a.id===s.area)?.name||s.area;
h+=`<div class="qs${d?' done':''}" onclick="togQS('${k}')"><div class="qs-num">${d?'&#10003;':(i+1)}</div><div class="qs-info"><div class="qs-text">${s.text}</div><div class="qs-area">${an} ${s.missable?'<span class="tag tag-missable" style="font-size:8px">Manquable</span>':''}</div></div></div>`});
h+=`</div></div>`});c.innerHTML=h}
function togQ(id){document.getElementById('q_'+id).classList.toggle('open')}
function togQS(k){qk[k]=!qk[k];save();renderQuests();updateProg()}

// ===================== ENDINGS =====================
function renderEndings(){
const c=document.getElementById('eView');let h='<h2 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:14px;font-size:18px">Fins</h2><p style="color:var(--text-dim);margin-bottom:16px;font-size:12px">6 fins. Toutes sauf Flamme Frenetique en 1 partie. Save avant boss final.</p>';
endings.forEach(e=>{h+=`<div class="ecard"><div class="ename">${e.name}</div><div class="ereq">${e.req}</div>${e.warn?`<div class="ewarn">${e.warn}</div>`:''}</div>`});c.innerHTML=h}

// ===================== VIEWS =====================
function showView(v,el){
curView=v;document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');
document.getElementById('mapWrap').classList.add('hidden');document.getElementById('areaView').classList.add('hidden');
document.getElementById('qView').className='qview';document.getElementById('eView').className='eview';
document.getElementById('filterBar').style.display=v==='map'?'flex':'none';
if(v==='map'){if(curArea)document.getElementById('areaView').classList.remove('hidden');else{document.getElementById('mapWrap').classList.remove('hidden');renderMap()}}
else if(v==='quests'){document.getElementById('qView').className='qview active';curArea=null}
else{document.getElementById('eView').className='eview active';curArea=null}
}
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;applyFilters()}));
function applyFilters(){if(curArea){const a=A.find(x=>x.id===curArea);if(a)renderCklist(a)}}
function updateProg(){let t=0,d=0;A.forEach(a=>{t+=a.items.length;d+=a.items.filter(i=>ck[i.id]).length});quests.forEach(q=>{t+=q.steps.length;d+=q.steps.filter((_,i)=>qk[q.id+'_'+i]).length});const p=t>0?(d/t*100):0;document.getElementById('totalProg').style.width=p+'%';document.getElementById('totalText').textContent=`${d}/${t} (${Math.round(p)}%)`}
