<title>Elden Ring - Guide Complet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a12;--bg2:#12121e;--bg3:#1a1a2e;--bg4:#22223a;
    --gold:#c8a84e;--gold-dim:#8a7235;--gold-bright:#e8c84e;
    --red:#c44040;--red-bg:rgba(196,64,64,0.12);
    --green:#4caf50;--blue:#5c8dd6;--purple:#9c6dd6;
    --text:#d4d0c8;--text-dim:#888078;--text-bright:#f0ece4;
    --border:#2a2a3e;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:env(safe-area-inset-top);-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}

  /* HEADER */
  .header{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
  .header h1{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;white-space:nowrap}
  .header-progress{flex:1;min-width:150px;max-width:280px}
  .progress-bar{background:var(--bg4);border-radius:10px;height:7px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));border-radius:10px;transition:width .4s}
  .progress-text{font-size:11px;color:var(--text-dim);margin-top:2px}
  .nav{display:flex;gap:4px;margin-left:auto}
  .nav button{background:0;border:1px solid var(--border);color:var(--text-dim);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
  .nav button:hover{border-color:var(--gold-dim);color:var(--text)}
  .nav button.active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}

  /* FILTERS */
  .filters{padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);align-items:center}
  .fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
  .fbtn:hover{border-color:var(--gold-dim)}
  .fbtn.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:500}
  .fbtn.miss.active{background:var(--red);border-color:var(--red);color:#fff}
  .search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:3px 10px;border-radius:16px;font-size:11px;outline:none;width:180px;font-family:'Inter',sans-serif;margin-left:auto}
  .search-input::placeholder{color:var(--text-dim)}
  .search-input:focus{border-color:var(--gold-dim)}

  /* MAIN */
  .main{display:flex;height:calc(100vh - 88px)}
  .hidden{display:none!important}

  /* WORLD MAP */
  .map-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .map-tabs{display:flex;gap:5px;padding:12px 20px 0}
  .mtab{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
  .mtab:hover{border-color:var(--gold-dim)}
  .mtab.active{background:var(--bg4);border-color:var(--gold);color:var(--gold)}
  .map-container{flex:1;overflow:auto;margin:12px 20px 20px;border-radius:10px;border:1px solid var(--border);background:#080810;display:flex;align-items:center;justify-content:center}
  .map-container svg{width:100%;height:100%;max-height:calc(100vh - 180px)}

  /* SVG */
  .land{fill:#10101c;stroke:#1a1a2e;stroke-width:1}
  .conn{stroke:#252540;stroke-width:1.5;stroke-dasharray:6,4;fill:none}
  .region{cursor:pointer}
  .region .rbg{rx:8;ry:8;stroke:#2a2a44;stroke-width:1.5;transition:all .15s}
  .region:hover .rbg{stroke:#8a7235;stroke-width:2;filter:brightness(1.25)}
  .region.sel .rbg{stroke:var(--gold);stroke-width:2.5;filter:brightness(1.3)}
  .region.done .rbg{stroke:var(--green);stroke-width:2}
  .region .rlbl{font-family:'Cinzel',serif;font-size:10.5px;fill:var(--text-bright);text-anchor:middle;pointer-events:none}
  .region .rpct{font-family:'Inter',sans-serif;font-size:8px;fill:var(--gold);text-anchor:middle;pointer-events:none}
  .region .rpbar-bg{fill:#0a0a14;rx:2;ry:2}
  .region .rpbar{fill:var(--gold);rx:2;ry:2;transition:width .3s}
  .region.done .rpbar{fill:var(--green)}
  .miss-dot{fill:var(--red)}
  .erdtree-glow{fill:url(#erdtreeGrad);opacity:.5}
  .erdtree-trunk{stroke:var(--gold-dim);stroke-width:2;fill:none;opacity:.4}
  .floating-label{font-family:'Inter',sans-serif;font-size:8px;fill:var(--text-dim);text-anchor:middle;font-style:italic}

  /* AREA DETAIL VIEW (full screen map + side checklist) */
  .area-view{display:flex;height:calc(100vh - 88px);width:100%}
  .area-map-section{flex:1;position:relative;overflow:auto;background:#080810;display:flex;align-items:center;justify-content:center;min-width:0}
  .area-map-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .area-map-fallback{color:var(--text-dim);text-align:center;padding:40px}
  .area-map-fallback p{margin-top:8px;font-size:12px}
  .area-map-fallback .fallback-icon{font-size:48px;opacity:.25;margin-bottom:12px;display:block}

  .back-btn{position:absolute;top:14px;left:14px;background:rgba(10,10,18,.9);border:1px solid var(--border);color:var(--gold);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;z-index:10;transition:all .2s;display:flex;align-items:center;gap:6px}
  .back-btn:hover{border-color:var(--gold);background:rgba(26,26,46,.95)}
  .back-btn svg{width:14px;height:14px;fill:var(--gold)}

  .area-panel{width:420px;min-width:420px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
  .area-panel-head{padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10}
  .area-panel-head h2{font-family:'Cinzel',serif;font-size:17px;color:var(--gold);margin-bottom:4px}
  .area-panel-head p{font-size:11px;color:var(--text-dim);line-height:1.5}
  .area-panel-stats{display:flex;gap:10px;margin-top:8px;font-size:11px}
  .dstat{background:var(--bg4);padding:3px 8px;border-radius:10px;color:var(--text-dim)}
  .dstat span{color:var(--text);font-weight:500}
  .area-panel-progress{margin-top:10px}
  .area-pbar{background:var(--bg4);border-radius:6px;height:6px;overflow:hidden}
  .area-pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));border-radius:6px;transition:width .3s}

  .checklist{padding:10px 18px 20px;flex:1}
  .cg-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-dim);margin:14px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--border);letter-spacing:1px}
  .ci{display:flex;align-items:flex-start;gap:9px;padding:7px 8px;border-radius:6px;transition:background .15s;cursor:pointer}
  .ci:hover{background:var(--bg4)}
  .ci.done{opacity:.4}
  .ci.done .ci-name{text-decoration:line-through}
  .ci-box{width:16px;height:16px;min-width:16px;border:2px solid var(--border);border-radius:3px;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:10px}
  .ci.done .ci-box{background:var(--green);border-color:var(--green);color:#fff}
  .ci-info{flex:1;min-width:0}
  .ci-name{font-size:12px;color:var(--text-bright);font-weight:500;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .ci-desc{font-size:11px;color:var(--text-dim);margin-top:1px;line-height:1.45}
  .tag{font-size:8px;padding:1px 5px;border-radius:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
  .tag-boss{background:rgba(220,90,60,.2);color:#e07050}
  .tag-npc{background:rgba(92,141,214,.2);color:var(--blue)}
  .tag-item{background:rgba(200,168,78,.2);color:var(--gold)}
  .tag-location{background:rgba(156,109,214,.2);color:var(--purple)}
  .tag-quest{background:rgba(92,141,214,.12);color:var(--blue);border:1px solid rgba(92,141,214,.25)}
  .tag-missable{background:var(--red-bg);color:var(--red);border:1px solid rgba(196,64,64,.3)}
  .tag-fin{background:rgba(76,175,80,.15);color:var(--green)}

  /* QUESTS & ENDINGS */
  .qview{padding:20px;max-width:800px;margin:0 auto;display:none;overflow-y:auto;flex:1}
  .qview.active{display:block}
  .qcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
  .qcard:hover{border-color:var(--gold-dim)}
  .qhead{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .qname{font-family:'Cinzel',serif;font-size:14px;color:var(--text-bright)}
  .qmeta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
  .qarrow{transition:transform .2s;color:var(--text-dim);font-size:11px}
  .qcard.open .qarrow{transform:rotate(180deg)}
  .qsteps{display:none;padding:0 16px 12px}
  .qcard.open .qsteps{display:block}
  .qs{display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--border);align-items:flex-start;cursor:pointer}
  .qs.done{opacity:.4}
  .qs.done .qs-text{text-decoration:line-through}
  .qs-num{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text-dim)}
  .qs.done .qs-num{background:var(--green);border-color:var(--green);color:#fff}
  .qs-info{flex:1}
  .qs-text{font-size:12px;color:var(--text);line-height:1.5}
  .qs-area{font-size:10px;color:var(--text-dim);margin-top:2px}
  .eview{padding:20px;max-width:800px;margin:0 auto;display:none;overflow-y:auto;flex:1}
  .eview.active{display:block}
  .ecard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
  .ename{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-bottom:5px}
  .ereq{font-size:12px;color:var(--text);line-height:1.6}
  .ewarn{background:var(--red-bg);border:1px solid rgba(196,64,64,.25);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:11px;color:var(--red);line-height:1.5}

  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
  @media(max-width:900px){
    .main{flex-direction:column}
    .area-view{flex-direction:column}
    .area-panel{width:100%;min-width:unset;max-height:50vh;border-left:0;border-top:1px solid var(--border)}
    .area-map-section{min-height:35vh}
  }
</style>
</head>
<body>
<div class="header">
  <h1>ELDEN RING</h1>
  <div class="header-progress">
    <div class="progress-bar"><div class="progress-fill" id="totalProg" style="width:0%"></div></div>
    <div class="progress-text" id="totalText">0 / 0</div>
  </div>
  <div class="nav">
    <button class="active" onclick="showView('map',this)">Carte</button>
    <button onclick="showView('quests',this)">Quetes PNJ</button>
    <button onclick="showView('endings',this)">Fins</button>
  </div>
</div>
<div class="filters" id="filterBar">
  <button class="fbtn active" data-f="all">Tout</button>
  <button class="fbtn" data-f="boss">Boss</button>
  <button class="fbtn" data-f="npc">PNJ</button>
  <button class="fbtn" data-f="item">Objets</button>
  <button class="fbtn" data-f="location">Lieux</button>
  <button class="fbtn miss" data-f="missable">Manquable</button>
  <input type="text" class="search-input" placeholder="Rechercher..." id="searchIn" oninput="applyFilters()">
</div>
<div class="main" id="mainContent">
  <!-- WORLD MAP VIEW -->
  <div class="map-wrap" id="mapWrap">
    <div class="map-tabs">
      <button class="mtab active" onclick="showMap('overworld',this)">L'Entre-Terre</button>
      <button class="mtab" onclick="showMap('underground',this)">Souterrains</button>
      <button class="mtab" onclick="showMap('dlc',this)">Shadow of the Erdtree</button>
    </div>
    <div class="map-container" id="mapCont"></div>
  </div>

  <!-- AREA DETAIL VIEW (replaces world map when area selected) -->
  <div class="area-view hidden" id="areaView">
    <div class="area-map-section">
      <button class="back-btn" onclick="backToMap()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Carte
      </button>
      <div id="areaMapContent"></div>
    </div>
    <div class="area-panel">
      <div class="area-panel-head">
        <h2 id="apTitle"></h2>
        <p id="apDesc"></p>
        <div class="area-panel-stats" id="apStats"></div>
        <div class="area-panel-progress"><div class="area-pbar"><div class="area-pbar-fill" id="apBar" style="width:0%"></div></div></div>
      </div>
      <div class="checklist" id="cklist"></div>
    </div>
  </div>

  <!-- QUESTS & ENDINGS -->
  <div class="qview" id="qView"></div>
  <div class="eview" id="eView"></div>
</div>

// ============================= STATE =============================
let ck=JSON.parse(localStorage.getItem('er4_ck')||'{}');
let qk=JSON.parse(localStorage.getItem('er4_qk')||'{}');
let curArea=null,curView='map',curMap='overworld',curFilter='all';
function save(){localStorage.setItem('er4_ck',JSON.stringify(ck));localStorage.setItem('er4_qk',JSON.stringify(qk))}

// ============================= WORLD MAP =============================
function showMap(id,el){curMap=id;document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');renderMap()}

function renderMap(){
  const ml=mapLayout[curMap];
  const areas=A.filter(a=>a.map===curMap);
  const rw=140,rh=44;
  let svg=`<svg viewBox="${ml.viewBox}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif">`;
  svg+=`<defs><radialGradient id="erdtreeGrad"><stop offset="0%" stop-color="#c8a84e" stop-opacity=".3"/><stop offset="100%" stop-color="#c8a84e" stop-opacity="0"/></radialGradient></defs>`;
  if(ml.land) svg+=`<path class="land" d="${ml.land}" opacity=".6"/>`;
  if(ml.erdtree){
    const e=ml.erdtree;
    svg+=`<circle class="erdtree-glow" cx="${e.x}" cy="${e.y-10}" r="60"/>`;
    svg+=`<line class="erdtree-trunk" x1="${e.x}" y1="${e.y+15}" x2="${e.x}" y2="${e.y-40}"/>`;
    svg+=`<line class="erdtree-trunk" x1="${e.x}" y1="${e.y-20}" x2="${e.x-15}" y2="${e.y-35}"/>`;
    svg+=`<line class="erdtree-trunk" x1="${e.x}" y1="${e.y-20}" x2="${e.x+15}" y2="${e.y-35}"/>`;
    svg+=`<line class="erdtree-trunk" x1="${e.x}" y1="${e.y-10}" x2="${e.x-20}" y2="${e.y-28}"/>`;
    svg+=`<line class="erdtree-trunk" x1="${e.x}" y1="${e.y-10}" x2="${e.x+20}" y2="${e.y-28}"/>`;
  }
  ml.connections.forEach(([f,t])=>{const a1=A.find(a=>a.id===f),a2=A.find(a=>a.id===t);if(a1&&a2)svg+=`<line class="conn" x1="${a1.sx}" y1="${a1.sy}" x2="${a2.sx}" y2="${a2.sy}"/>`});
  areas.forEach(a=>{
    const total=a.items.length,done=a.items.filter(i=>ck[i.id]).length;
    const pct=total>0?Math.round(done/total*100):0;
    const hasMiss=a.items.some(i=>i.missable&&!ck[i.id]);
    const x=a.sx-rw/2,y=a.sy-rh/2;
    const pbw=rw-20;
    let cls='region';if(pct===100)cls+=' done';
    svg+=`<g class="${cls}" onclick="selectArea('${a.id}')">`;
    svg+=`<rect class="rbg" x="${x}" y="${y}" width="${rw}" height="${rh}" fill="${a.color||'#1a1a2e'}"/>`;
    svg+=`<text class="rlbl" x="${a.sx}" y="${a.sy-2}">${a.name}</text>`;
    svg+=`<rect class="rpbar-bg" x="${x+10}" y="${a.sy+10}" width="${pbw}" height="4"/>`;
    svg+=`<rect class="rpbar" x="${x+10}" y="${a.sy+10}" width="${pbw*pct/100}" height="4"/>`;
    svg+=`<text class="rpct" x="${a.sx}" y="${a.sy+24}">${pct}%</text>`;
    if(hasMiss)svg+=`<circle class="miss-dot" cx="${x+rw-6}" cy="${y+6}" r="4"/>`;
    svg+=`</g>`;
  });
  if(curMap==='overworld')svg+=`<text class="floating-label" x="840" y="50">(flottant)</text>`;
  svg+=`</svg>`;
  document.getElementById('mapCont').innerHTML=svg;
}

// ============================= AREA DETAIL VIEW =============================
function selectArea(id){
  curArea=id;
  const a=A.find(x=>x.id===id);if(!a)return;

  // Hide world map, show area view
  document.getElementById('mapWrap').classList.add('hidden');
  document.getElementById('areaView').classList.remove('hidden');

  // Area panel header
  document.getElementById('apTitle').textContent=a.name;
  document.getElementById('apDesc').textContent=a.desc;
  const total=a.items.length,done=a.items.filter(i=>ck[i.id]).length;
  const miss=a.items.filter(i=>i.missable).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('apStats').innerHTML=`<div class="dstat"><span>${done}/${total}</span> fait</div>${miss?`<div class="dstat" style="color:var(--red)"><span>${miss}</span> manquable(s)</div>`:''}`;
  document.getElementById('apBar').style.width=pct+'%';

  // Area map image
  const mc=document.getElementById('areaMapContent');
  if(a.img){
    mc.innerHTML=`<img class="area-map-img" src="${a.img}" alt="${a.name}" onerror="this.parentElement.innerHTML='<div class=area-map-fallback><span class=fallback-icon>&#9876;</span><b>${a.name}</b><p>Carte non disponible.<br>Consulte la checklist a droite.</p></div>'">`;
  } else {
    mc.innerHTML=`<div class="area-map-fallback"><span class="fallback-icon">&#9876;</span><b>${a.name}</b><p>Carte non disponible.<br>Consulte la checklist a droite.</p></div>`;
  }

  renderCklist(a);
}

function backToMap(){
  curArea=null;
  document.getElementById('areaView').classList.add('hidden');
  document.getElementById('mapWrap').classList.remove('hidden');
  renderMap();
}

// ============================= CHECKLIST =============================
const typeNames={boss:'Boss',npc:'PNJ',item:'Objets',location:'Lieux',quest:'Quetes'};

function renderCklist(a){
  const c=document.getElementById('cklist');
  const search=document.getElementById('searchIn').value.toLowerCase();
  const groups={boss:[],npc:[],item:[],location:[],quest:[]};
  a.items.forEach(i=>{
    if(curFilter==='missable'&&!i.missable)return;
    if(curFilter!=='all'&&curFilter!=='missable'&&i.type!==curFilter)return;
    if(search&&!i.name.toLowerCase().includes(search)&&!i.desc.toLowerCase().includes(search))return;
    (groups[i.type]||groups.location).push(i);
  });
  let h='';
  Object.entries(groups).forEach(([t,items])=>{
    if(!items.length)return;
    h+=`<div class="cg-title">${typeNames[t]||t}</div>`;
    items.forEach(i=>{
      const d=ck[i.id];
      h+=`<div class="ci${d?' done':''}" onclick="tog('${i.id}','${a.id}')"><div class="ci-box">${d?'&#10003;':''}</div><div class="ci-info"><div class="ci-name">${i.name}${i.missable?'<span class="tag tag-missable">Manquable</span>':''}<span class="tag tag-${i.type}">${typeNames[i.type]||i.type}</span></div><div class="ci-desc">${i.desc}${i.location?' <b>('+i.location+')</b>':''}</div></div></div>`;
    });
  });
  if(!h)h='<div style="padding:20px;color:var(--text-dim);text-align:center">Aucun element pour ce filtre.</div>';
  c.innerHTML=h;
}

function tog(iid,aid){
  ck[iid]=!ck[iid];save();
  const a=A.find(x=>x.id===aid);
  if(a){
    renderCklist(a);
    // Update panel stats
    const total=a.items.length,done=a.items.filter(i=>ck[i.id]).length;
    const miss=a.items.filter(i=>i.missable).length;
    const pct=total>0?Math.round(done/total*100):0;
    document.getElementById('apStats').innerHTML=`<div class="dstat"><span>${done}/${total}</span> fait</div>${miss?`<div class="dstat" style="color:var(--red)"><span>${miss}</span> manquable(s)</div>`:''}`;
    document.getElementById('apBar').style.width=pct+'%';
  }
  updateProg();
}

// ============================= QUESTS =============================
function renderQuests(){
  const c=document.getElementById('qView');
  let h='<h2 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:14px;font-size:18px">Quetes de PNJ</h2>';
  quests.forEach(q=>{
    const total=q.steps.length,done=q.steps.filter((_,i)=>qk[q.id+'_'+i]).length;
    h+=`<div class="qcard" id="q_${q.id}"><div class="qhead" onclick="togQ('${q.id}')"><div><div class="qname">${q.name}</div><div class="qmeta">${q.ending?`<span class="tag tag-fin">${q.ending}</span>`:''}${done}/${total}</div></div><span class="qarrow">&#9660;</span></div><div class="qsteps">`;
    q.steps.forEach((s,i)=>{
      const k=q.id+'_'+i,d=qk[k],an=A.find(a=>a.id===s.area)?.name||s.area;
      h+=`<div class="qs${d?' done':''}" onclick="togQS('${k}')"><div class="qs-num">${d?'&#10003;':(i+1)}</div><div class="qs-info"><div class="qs-text">${s.text}</div><div class="qs-area">${an} ${s.missable?'<span class="tag tag-missable" style="font-size:8px">Manquable</span>':''}</div></div></div>`;
    });
    h+=`</div></div>`;
  });
  c.innerHTML=h;
}
function togQ(id){document.getElementById('q_'+id).classList.toggle('open')}
function togQS(k){qk[k]=!qk[k];save();renderQuests();updateProg()}

// ============================= ENDINGS =============================
function renderEndings(){
  const c=document.getElementById('eView');
  let h='<h2 style="font-family:Cinzel,serif;color:var(--gold);margin-bottom:14px;font-size:18px">Guide des Fins</h2>';
  h+='<p style="color:var(--text-dim);margin-bottom:16px;font-size:12px;line-height:1.6">6 fins. Toutes sauf Flamme Frenetique en une partie. Sauvegarde avant boss final.</p>';
  endings.forEach(e=>{
    h+=`<div class="ecard"><div class="ename">${e.name}</div><div class="ereq">${e.req}</div>${e.warn?`<div class="ewarn">${e.warn}</div>`:''}</div>`;
  });
  c.innerHTML=h;
}

// ============================= VIEWS =============================
function showView(v,el){
  curView=v;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  // Hide everything
  document.getElementById('mapWrap').classList.add('hidden');
  document.getElementById('areaView').classList.add('hidden');
  document.getElementById('qView').className='qview';
  document.getElementById('eView').className='eview';
  document.getElementById('filterBar').style.display=v==='map'?'flex':'none';

  if(v==='map'){
    if(curArea){
      document.getElementById('areaView').classList.remove('hidden');
    } else {
      document.getElementById('mapWrap').classList.remove('hidden');
      renderMap();
    }
  } else if(v==='quests'){
    document.getElementById('qView').className='qview active';
    curArea=null;
  } else if(v==='endings'){
    document.getElementById('eView').className='eview active';
    curArea=null;
  }
}

document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curFilter=b.dataset.f;applyFilters();
}));
function applyFilters(){if(curArea){const a=A.find(x=>x.id===curArea);if(a)renderCklist(a)}}

function updateProg(){
  let t=0,d=0;
  A.forEach(a=>{t+=a.items.length;d+=a.items.filter(i=>ck[i.id]).length});
  quests.forEach(q=>{t+=q.steps.length;d+=q.steps.filter((_,i)=>qk[q.id+'_'+i]).length});
  const p=t>0?(d/t*100):0;
  document.getElementById('totalProg').style.width=p+'%';
  document.getElementById('totalText').textContent=`${d} / ${t} (${Math.round(p)}%)`;
}

// ============================= INIT =============================
renderMap();renderQuests();renderEndings();updateProg();
document.querySelector('.header h1').addEventListener('click',e=>{
  if(e.shiftKey&&confirm('Remettre progression a zero ?')){ck={};qk={};save();location.reload()}
});
</script>
